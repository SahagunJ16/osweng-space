<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#18181b" />
      <stop offset="100%" stop-color="#09090b" />
    </linearGradient>
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="50%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
  </defs>
  <!-- Background with smooth rounded corners suitable for maskable purposes -->
  <rect width="512" height="512" rx="128" fill="url(#bg-grad)" />
  
  <!-- Outer glowing accent ring -->
  <circle cx="256" cy="256" r="160" stroke="url(#logo-grad)" stroke-width="4" fill="none" opacity="0.25" />
  
  <!-- Main logo symbol (minimalist premium 'O' with gradient) -->
  <circle cx="256" cy="256" r="120" stroke="url(#logo-grad)" stroke-width="24" fill="none" opacity="0.95" />
  
  <!-- Inner stylized S curve representing the personal signature style -->
  <path d="M 210 230 C 210 185, 302 185, 302 230 C 302 275, 210 275, 210 320 C 210 365, 302 365, 302 320" 
        stroke="url(#logo-grad)" stroke-width="16" stroke-linecap="round" fill="none" opacity="0.9" />
</svg>
